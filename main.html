<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>

    <!-- daiseyUI & tailwind -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- font-geist -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">

    <style>
        .font-geist {
            font-family: "Geist", sans-serif;
        }
    </style>

</head>

<body class="font-geist">
    <header>
        <!-- navbar -->
        <div class="navbar bg-base-100 shadow-sm">
            <div class="flex-1">
                <a class="btn btn-ghost text-xl items-center">
                    <img class="w-[36px]" src="./assets/github-logo.png" alt="">
                    GitHub Issues Tracker
                </a>
            </div>
            <div class="flex gap-2">
                <input type="text" placeholder="Search" class="input input-bordered w-24 md:w-auto" />
                <div class="">
                    <button class="btn btn-primary">
                        + New Issue
                    </button>
                </div>
            </div>
        </div>
    </header>

    <section class="w-11/12 mx-auto">
        <div class="p-6 shadow-sm flex flex-row gap-3 mt-12">
            <button class="btn btn-outline btn-sm w-30">All</button>
            <button class="btn btn-outline btn-sm w-30">Open</button>
            <button class="btn btn-outline btn-sm w-30">Closed</button>
        </div>
    </section>

    <script src="./Scripts/script.js"></script>
</body>

</html>
