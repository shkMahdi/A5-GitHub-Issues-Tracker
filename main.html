<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>

    <!-- daiseyUI & tailwind -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- font-geist -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">

    <style>
        .font-geist {
            font-family: "Geist", sans-serif;
        }
    </style>

</head>

<body class="font-geist">
    <header>
        <!-- navbar -->
        <div class="navbar bg-base-100 shadow-sm">
            <div class="flex-1">
                <a class="btn btn-ghost text-sm md:text-xl items-center">
                    <img class="w-7 md:w-9" src="./assets/github-logo.png" alt="">
                    GitHub Issues Tracker
                </a>
            </div>
            <div class="flex gap-2">
                <input id="search-input" type="text" placeholder="Search Issues" class="input input-bordered w-24 h-8 md:w-auto md:h-10" />
                <div class="">
                    <button class="btn btn-primary btn-sm md:btn-md">
                        + New Issue
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- tabs -->
    <section class="w-[95%] md:w-11/12 mx-auto mb-4">
        <div class="p-6 shadow-sm flex justify-center md:justify-start gap-3 mt-12">
            <button onclick="displayIssues()" id="btn-all" class="btn btn-primary btn-sm w-20 md:w-28">All</button>
            <button onclick="displayOpenIssues()" id="btn-open"
                class="btn btn-outline btn-sm w-20 md:w-28">Open</button>
            <button onclick="displayClosedIssues()" id="btn-closed"
                class="btn btn-outline btn-sm w-20 md:w-28">Closed</button>
        </div>
    </section>

    <!-- issues indicator bar -->
    <section class="w-[95%] md:w-11/12 mx-auto">
        <div class="p-6 shadow-sm flex gap-2">
            <div class="bg-purple-100 p-2 w-[50px] rounded-full flex justify-center items-center">
                <img src="./assets/Aperture.png" alt="">
            </div>
            <div class="flex justify-between flex-1">
                <div>
                    <p class="font-semibold text-[20px]">
                        <span id="number-of-issues"></span> Issues
                    </p>
                    <p class="text-gray-400">
                        Track and manage your project issues
                    </p>
                </div>
                <div class="flex items-center gap-6">
                    <div class="flex items-center gap-2">
                        <span class="w-3 h-3 bg-green-500 rounded-full"></span>
                        <span>Open</span>
                    </div>

                    <div class="flex items-center gap-2">
                        <span class="w-3 h-3 bg-purple-500 rounded-full"></span>
                        <span>Closed</span>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- spinner -->
     <section id="spinner" class="w-[95%] md:w-11/12 mx-auto p-6 shadow-xl hidden">
        <div class="flex justify-center items-center">
            <span class="loading loading-dots loading-xl"></span>
        </div>
     </section>

    <!-- issue section -->
    <section id="issue-container" class="w-[95%] md:w-11/12 mx-auto p-6 shadow-xl">
        <div id="card-container" class="grid cols-1 md:grid-cols-4 gap-4">



        </div>
    </section>

     <!-- my_modal_5.showModal() -->
    <dialog id="my_modal_5" class="modal modal-bottom sm:modal-middle">
        <div class="modal-box">
            <div id="info-container">
                
            </div>
        </div>
    </dialog>

    <script src="./Scripts/script.js"></script>
</body>

</html>
